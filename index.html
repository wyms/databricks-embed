<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Databricks demo</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font: 14px/1.5 system-ui, -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 12px 20px 0;
        border-bottom: 1px solid #ddd;
      }
      header h1 { font-size: 16px; margin: 0; }
      header p { margin: 4px 0 8px; color: #666; font-size: 12px; }
      .tabs {
        display: flex;
        gap: 4px;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .tab {
        appearance: none;
        background: transparent;
        border: 0;
        border-bottom: 2px solid transparent;
        padding: 8px 14px;
        font: inherit;
        color: inherit;
        cursor: pointer;
        border-radius: 4px 4px 0 0;
      }
      .tab:hover { background: rgba(127,127,127,0.08); }
      .tab[aria-selected="true"] {
        border-bottom-color: #2860d8;
        color: #2860d8;
        font-weight: 600;
      }
      main { flex: 1; min-height: 0; position: relative; }
      iframe { width: 100%; height: 100%; border: 0; display: block; }
      #content {
        display: none;
        height: 100%;
        overflow: auto;
        padding: 24px 32px 48px;
        box-sizing: border-box;
        max-width: 900px;
      }
      #content h2 { font-size: 18px; margin: 24px 0 8px; }
      #content h3 { font-size: 14px; margin: 16px 0 6px; color: #666; text-transform: uppercase; letter-spacing: 0.04em; }
      #content ul { margin: 6px 0 12px; padding-left: 22px; }
      #content li { margin: 4px 0; }
      #content code { font-size: 12px; padding: 1px 4px; background: rgba(127,127,127,0.12); border-radius: 3px; }
      #content a { color: #2860d8; }
      .callout {
        background: rgba(40, 96, 216, 0.08);
        border-left: 3px solid #2860d8;
        padding: 12px 16px;
        margin: 16px 0;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="title">Cost Overview</h1>
      <p id="subtitle">
        trial400 workspace cost &amp; usage. Data runs against
        <code>system.billing.usage</code> + <code>system.billing.list_prices</code>.
      </p>
      <div class="tabs" role="tablist">
        <button class="tab" role="tab" aria-selected="true"  data-key="cost">Cost Overview</button>
        <button class="tab" role="tab" aria-selected="false" data-key="tracker">Tracker GCC</button>
        <button class="tab" role="tab" aria-selected="false" data-key="contracts">Contract Intelligence</button>
        <button class="tab" role="tab" aria-selected="false" data-key="about">Disclaimers / Caveats</button>
      </div>
    </header>
    <main>
      <iframe id="embed"
        title="Cost Overview"
        allow="clipboard-read; clipboard-write"
      ></iframe>
      <div id="content"></div>
    </main>
    <script>
      const ABOUT_HTML = `
        <h2>Proof of Concept &mdash; please read</h2>
        <div class="callout">
          This site is a <strong>proof of concept</strong> built on a
          <strong>Databricks Free Trial</strong> workspace. It is not a
          production system. Expect occasional downtime, data freshness lag,
          and ongoing changes.
        </div>

        <h3>What it is</h3>
        <ul>
          <li>A static GitHub Pages page (this site) that embeds three Databricks
              surfaces by iframe: a Lakeview cost dashboard, a geospatial tracker
              app, and a federal-contracts analytics app.</li>
          <li>All three back ends run on a single Databricks Free Trial
              workspace (<code>trial400</code>), with apps running on Databricks
              Apps compute and the dashboard rendering via Databricks AI/BI
              with anonymous embed credentials.</li>
        </ul>

        <h3>Built with AI tools</h3>
        <ul>
          <li>Source code (ingest pipelines, app servers, dashboards, this
              embed page) was authored interactively with the help of AI coding
              assistants (Claude Code / Claude Opus). Every line was reviewed
              and either kept, edited, or rejected by a human before commit.</li>
          <li>The geospatial app's natural-language query layer uses
              <strong>Databricks Genie</strong>; the cost dashboard's
              &ldquo;Ask Genie&rdquo; panel uses the same.</li>
        </ul>

        <h3>Data sources &mdash; 100% publicly available</h3>
        <ul>
          <li><strong>USASpending.gov</strong> &mdash; federal contract awards
              (Contract Intelligence tab)</li>
          <li><strong>FPDS, SAM.gov, Treasury Fiscal Data</strong> &mdash;
              referenced in the broader pipeline; not all are populated in this
              demo</li>
          <li><strong>OpenSky Network</strong> &mdash; flight position data
              (Tracker tab)</li>
          <li><strong>USGS, NASA EONET, NASA FIRMS</strong> &mdash; earthquakes,
              natural events, fires</li>
          <li><strong>Cesium Ion / Google Photorealistic 3D Tiles</strong>
              &mdash; globe imagery</li>
          <li><strong>OFAC SDN List, WHO disease outbreaks, FAA, AIS</strong>
              &mdash; additional public-record overlays</li>
          <li><strong>Databricks <code>system.billing.usage</code></strong>
              &mdash; this workspace's own cost data (Cost Overview tab)</li>
        </ul>
        <p>No PII, no proprietary, no licensed data is used.</p>

        <h3>Caveats</h3>
        <ul>
          <li>The two app tabs (Tracker, Contract Intelligence) require a
              login to the trial400 workspace; each app subdomain has its own
              auth cookie, so you may need to open each app directly once
              before the iframe renders.</li>
          <li>Cost figures lag &asymp; 24h &mdash; today's usage typically lands
              tomorrow.</li>
          <li>The Free Trial has finite compute credits. Apps and the SQL
              warehouse are stopped between sessions to conserve them; you may
              see "App is starting" on first load.</li>
          <li>Source code:
              <a href="https://github.com/wyms/dbxrebuild" target="_blank" rel="noopener">github.com/wyms/dbxrebuild</a>
              (Databricks bundles + apps) and
              <a href="https://github.com/wyms/databricks-embed" target="_blank" rel="noopener">github.com/wyms/databricks-embed</a>
              (this page).</li>
        </ul>
      `;

      const TARGETS = {
        cost: {
          type: 'iframe',
          title: 'Cost Overview',
          subtitle: 'trial400 workspace cost &amp; usage. Data runs against <code>system.billing.usage</code> + <code>system.billing.list_prices</code>.',
          src: 'https://dbc-a9e2bc23-5ac8.cloud.databricks.com/embed/dashboardsv3/01f154b6a01b12cc8619e5efde8fb29f',
        },
        tracker: {
          type: 'iframe',
          title: 'Tracker GCC',
          subtitle: 'Geospatial Command Center — globe + Genie/Ask-AI over <code>gcc.gold.*</code>. <em>Requires login to the trial400 workspace.</em>',
          src: 'https://tracker-gcc-app-7474645551322247.aws.databricksapps.com',
        },
        contracts: {
          type: 'iframe',
          title: 'Contract Intelligence',
          subtitle: 'Federal Spending Analytics Platform. Queries <code>contract_intelligence.gold.*</code> (USASpending awards). <em>Requires login to the trial400 workspace.</em>',
          src: 'https://contract-intelligence-7474645551322247.aws.databricksapps.com',
        },
        about: {
          type: 'content',
          title: 'Disclaimers / Caveats',
          subtitle: 'About this demo — what it is, what it isn\'t, and where the data comes from.',
          html: ABOUT_HTML,
        },
      };

      const iframe = document.getElementById('embed');
      const content = document.getElementById('content');
      const title = document.getElementById('title');
      const subtitle = document.getElementById('subtitle');
      const tabs = document.querySelectorAll('.tab');

      function show(key) {
        const t = TARGETS[key];
        if (!t) return;
        title.textContent = t.title;
        subtitle.innerHTML = t.subtitle;
        if (t.type === 'iframe') {
          iframe.src = t.src;
          iframe.title = t.title;
          iframe.style.display = 'block';
          content.style.display = 'none';
        } else {
          iframe.src = 'about:blank';
          iframe.style.display = 'none';
          content.innerHTML = t.html;
          content.style.display = 'block';
        }
        tabs.forEach(b => b.setAttribute('aria-selected', b.dataset.key === key));
        if (location.hash !== '#' + key) history.replaceState(null, '', '#' + key);
      }

      tabs.forEach(b => b.addEventListener('click', () => show(b.dataset.key)));

      const initial = (location.hash || '').replace('#','') in TARGETS
        ? location.hash.slice(1)
        : 'cost';
      show(initial);
    </script>
  </body>
</html>
