<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Databricks demo</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font: 14px/1.5 system-ui, -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 12px 20px 0;
        border-bottom: 1px solid #ddd;
      }
      header h1 { font-size: 16px; margin: 0; }
      header p { margin: 4px 0 8px; color: #666; font-size: 12px; }
      .tabs {
        display: flex;
        gap: 4px;
        margin-top: 8px;
      }
      .tab {
        appearance: none;
        background: transparent;
        border: 0;
        border-bottom: 2px solid transparent;
        padding: 8px 14px;
        font: inherit;
        color: inherit;
        cursor: pointer;
        border-radius: 4px 4px 0 0;
      }
      .tab:hover { background: rgba(127,127,127,0.08); }
      .tab[aria-selected="true"] {
        border-bottom-color: #2860d8;
        color: #2860d8;
        font-weight: 600;
      }
      main { flex: 1; min-height: 0; }
      iframe { width: 100%; height: 100%; border: 0; display: block; }
    </style>
  </head>
  <body>
    <header>
      <h1 id="title">Contract Intelligence</h1>
      <p id="subtitle">
        Federal Spending Analytics Platform. Queries
        <code>contract_intelligence.gold.*</code> (USASpending awards) on
        trial400.
      </p>
      <div class="tabs" role="tablist">
        <button class="tab" role="tab" aria-selected="true"  data-key="contracts">Contract Intelligence</button>
        <button class="tab" role="tab" aria-selected="false" data-key="tracker">Tracker GCC</button>
      </div>
    </header>
    <main>
      <iframe id="embed"
        title="Contract Intelligence"
        allow="clipboard-read; clipboard-write"
      ></iframe>
    </main>
    <script>
      const APPS = {
        contracts: {
          title: 'Contract Intelligence',
          subtitle: 'Federal Spending Analytics Platform. Queries <code>contract_intelligence.gold.*</code> (USASpending awards) on trial400.',
          src: 'https://contract-intelligence-7474645551322247.aws.databricksapps.com',
        },
        tracker: {
          title: 'Tracker GCC',
          subtitle: 'Geospatial Command Center — globe + Genie/Ask-AI over <code>gcc.gold.*</code> on trial400.',
          src: 'https://tracker-gcc-app-7474645551322247.aws.databricksapps.com',
        },
      };

      const iframe = document.getElementById('embed');
      const title = document.getElementById('title');
      const subtitle = document.getElementById('subtitle');
      const tabs = document.querySelectorAll('.tab');

      function show(key) {
        const a = APPS[key];
        if (!a) return;
        iframe.src = a.src;
        iframe.title = a.title;
        title.textContent = a.title;
        subtitle.innerHTML = a.subtitle;
        tabs.forEach(t => t.setAttribute('aria-selected', t.dataset.key === key));
        if (location.hash !== '#' + key) history.replaceState(null, '', '#' + key);
      }

      tabs.forEach(t => t.addEventListener('click', () => show(t.dataset.key)));

      const initial = (location.hash || '').replace('#','') in APPS
        ? location.hash.slice(1)
        : 'contracts';
      show(initial);
    </script>
  </body>
</html>
