<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Databricks demo</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fbfbfc;
        --surface: #ffffff;
        --surface-2: #f4f4f5;
        --surface-3: #e8e8eb;
        --text: #0a0a0a;
        --text-2: #3f3f46;
        --text-muted: #71717a;
        --border: #e4e4e7;
        --border-strong: #d4d4d8;
        --accent: #6366f1;
        --accent-2: #8b5cf6;
        --accent-soft: rgba(99, 102, 241, 0.08);
        --accent-grad: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
        --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.04);
        --shadow-active: 0 1px 2px rgba(0,0,0,0.06), 0 2px 8px rgba(99,102,241,0.12);
        --radius: 10px;
        --radius-lg: 14px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #050507;
          --surface: #0c0c10;
          --surface-2: #14141a;
          --surface-3: #1c1c24;
          --text: #fafafa;
          --text-2: #d4d4d8;
          --text-muted: #8b8b94;
          --border: #1c1c24;
          --border-strong: #2a2a35;
          --accent: #818cf8;
          --accent-2: #a78bfa;
          --accent-soft: rgba(129, 140, 248, 0.10);
          --accent-grad: linear-gradient(135deg, #818cf8 0%, #a78bfa 100%);
          --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
          --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.4);
          --shadow-active: 0 1px 2px rgba(0,0,0,0.5), 0 2px 12px rgba(129,140,248,0.20);
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: var(--bg);
        color: var(--text);
      }
      body {
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
        font-feature-settings: "cv11", "ss01", "cv02";
        letter-spacing: -0.005em;
        display: flex; flex-direction: column;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      header {
        position: relative;
        padding: 16px 24px 0;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(8px);
      }
      header::before {
        content: ""; position: absolute; inset: 0;
        background: var(--accent-grad); opacity: 0;
        pointer-events: none; transition: opacity 200ms;
      }
      .titlewrap {
        display: flex; align-items: baseline; gap: 14px;
        flex-wrap: wrap;
      }
      .brand {
        display: inline-flex; align-items: center; gap: 8px;
        font-weight: 600;
      }
      .brand-dot {
        width: 8px; height: 8px; border-radius: 2px;
        background: var(--accent-grad);
        box-shadow: 0 0 12px rgba(99,102,241,0.4);
      }
      header h1 {
        font-size: 17px;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.02em;
      }
      header p {
        margin: 0;
        color: var(--text-muted);
        font-size: 12px;
        flex: 1; min-width: 240px;
      }
      .tabs {
        display: flex;
        gap: 2px;
        margin-top: 14px;
        background: var(--surface-2);
        padding: 4px;
        border-radius: var(--radius);
        width: fit-content;
        max-width: 100%;
        overflow-x: auto;
        border: 1px solid var(--border);
      }
      .tab {
        appearance: none;
        background: transparent;
        border: 0;
        padding: 7px 14px;
        font: inherit;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        border-radius: 7px;
        white-space: nowrap;
        transition: background-color 150ms ease, color 150ms ease, transform 100ms ease;
        letter-spacing: -0.005em;
      }
      .tab:hover { color: var(--text-2); background: rgba(127,127,127,0.05); }
      .tab:active { transform: scale(0.96); }
      .tab[aria-selected="true"] {
        background: var(--surface);
        color: var(--text);
        box-shadow: var(--shadow-active);
        border: 1px solid var(--border);
      }
      .tab[aria-selected="true"]::before {
        content: ""; display: inline-block;
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--accent-grad);
        margin-right: 6px;
        vertical-align: middle;
      }
      main {
        flex: 1; min-height: 0; position: relative;
        background: var(--bg);
      }
      iframe {
        width: 100%; height: 100%;
        border: 0; display: block;
        background: var(--surface);
      }
      #content {
        display: none;
        height: 100%;
        overflow: auto;
        padding: 40px 32px 64px;
      }
      .container {
        max-width: 820px;
        margin: 0 auto;
      }
      #content h2 {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.025em;
        margin: 0 0 6px;
        background: var(--accent-grad);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
      }
      #content .lede {
        color: var(--text-muted);
        font-size: 14px;
        margin: 0 0 28px;
        max-width: 60ch;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 22px 26px;
        margin: 14px 0;
        box-shadow: var(--shadow-sm);
        transition: border-color 150ms ease, transform 150ms ease;
      }
      .card:hover {
        border-color: var(--border-strong);
      }
      .card.accent {
        position: relative;
        overflow: hidden;
        border: 1px solid transparent;
        background: var(--accent-soft);
      }
      .card.accent::before {
        content: ""; position: absolute; left: 0; top: 0; bottom: 0;
        width: 3px; background: var(--accent-grad);
      }
      .card h3 {
        font-size: 11px;
        margin: 0 0 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
      }
      .card.accent h3 { color: var(--accent); }
      .card p:first-child { margin-top: 0; }
      .card p:last-child { margin-bottom: 0; }
      .card p { margin: 8px 0; color: var(--text-2); }
      #content ul {
        margin: 8px 0 0;
        padding-left: 22px;
        color: var(--text-2);
      }
      #content li { margin: 6px 0; }
      #content code {
        font-family: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
        font-size: 12px;
        padding: 1px 6px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text);
      }
      #content a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: border-color 120ms ease;
        font-weight: 500;
      }
      #content a:hover { border-bottom-color: var(--accent); }
      .tagrow { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 6px; }
      .tag {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--surface-2);
        color: var(--text-2);
        border: 1px solid var(--border);
        font-weight: 500;
        transition: background-color 120ms;
      }
      .tag:hover { background: var(--surface-3); }
      .small { font-size: 13px; color: var(--text-muted); }
    </style>
  </head>
  <body>
    <header>
      <div class="titlewrap">
        <span class="brand"><span class="brand-dot" aria-hidden="true"></span><span id="title">Disclaimers</span></span>
        <p id="subtitle">
          About this demo &mdash; what it is, what it isn't, and where the data comes from.
        </p>
      </div>
      <div class="tabs" role="tablist">
        <button class="tab" role="tab" aria-selected="true"  data-key="about">Disclaimers</button>
        <button class="tab" role="tab" aria-selected="false" data-key="cost">Cost Overview</button>
        <button class="tab" role="tab" aria-selected="false" data-key="tracker">Tracker GCC</button>
        <button class="tab" role="tab" aria-selected="false" data-key="contracts">Contract Intelligence</button>
      </div>
    </header>
    <main>
      <iframe id="embed"
        title="Cost Overview"
        allow="clipboard-read; clipboard-write"
      ></iframe>
      <div id="content"></div>
    </main>
    <script>
      const ABOUT_HTML = `
        <div class="container">
          <h2>About this demo</h2>
          <p class="lede">What it is, what it isn't, and where the data comes from.</p>

          <div class="card accent">
            <h3>Heads up</h3>
            <p>This is a <strong>proof of concept</strong> built on a
            <strong>Databricks Free Trial</strong> workspace. It is not a
            production system. Expect occasional downtime, data freshness
            lag, and ongoing changes.</p>
          </div>

          <div class="card">
            <h3>What it is</h3>
            <ul>
              <li>A static GitHub Pages page that embeds three Databricks
                surfaces by iframe: a Lakeview cost dashboard, a geospatial
                tracker app, and a federal-contracts analytics app.</li>
              <li>All back ends run on a single Databricks Free Trial
                workspace (<code>jun02</code>) &mdash; apps on Databricks
                Apps compute, the dashboard via Databricks AI/BI with
                anonymous embed credentials.</li>
            </ul>
          </div>

          <div class="card">
            <h3>Built with AI tools</h3>
            <ul>
              <li>Source code (ingest pipelines, app servers, dashboards,
                this page) was authored interactively with Claude Code /
                Claude Opus. Every line was reviewed and either kept,
                edited, or rejected by a human before commit.</li>
              <li>The Tracker app's natural-language query layer uses
                <strong>Databricks Genie</strong>; the cost dashboard's
                &ldquo;Ask Genie&rdquo; panel uses the same.</li>
            </ul>
          </div>

          <div class="card">
            <h3>Data sources &mdash; 100% public</h3>
            <div class="tagrow">
              <span class="tag">USASpending.gov</span>
              <span class="tag">FPDS</span>
              <span class="tag">SAM.gov</span>
              <span class="tag">Treasury Fiscal</span>
              <span class="tag">OpenSky Network</span>
              <span class="tag">USGS</span>
              <span class="tag">NASA EONET</span>
              <span class="tag">NASA FIRMS</span>
              <span class="tag">Cesium Ion</span>
              <span class="tag">Google 3D Tiles</span>
              <span class="tag">OFAC SDN</span>
              <span class="tag">WHO outbreaks</span>
              <span class="tag">FAA</span>
              <span class="tag">AIS</span>
              <span class="tag">system.billing</span>
            </div>
            <p class="small" style="margin-top: 14px;">
              No PII. No proprietary or licensed data.
            </p>
          </div>

          <div class="card">
            <h3>Caveats</h3>
            <ul>
              <li>The Tracker and Contract Intelligence tabs require a
                login to the jun02 workspace; each app subdomain has its
                own auth cookie, so you may need to open each app URL once
                directly before the iframe renders.</li>
              <li>The Cost Overview is freshly wired on a brand-new trial
                (<code>jun02</code>); it stays empty until Databricks
                provisions the <code>system.billing</code> tables for the
                workspace (typically 24&ndash;48h), then backfills. Cost
                figures also lag &asymp; 24h.</li>
              <li>The Free Trial has finite compute credits. Apps and the
                SQL warehouse are stopped between sessions to conserve
                them; you may see &ldquo;App is starting&rdquo; on first load.</li>
            </ul>
          </div>

          <div class="card">
            <h3>Source</h3>
            <ul>
              <li><a href="https://github.com/wyms/dbxrebuild" target="_blank" rel="noopener">github.com/wyms/dbxrebuild</a>
                &mdash; Databricks bundles, ingest pipelines, apps</li>
              <li><a href="https://github.com/wyms/databricks-embed" target="_blank" rel="noopener">github.com/wyms/databricks-embed</a>
                &mdash; this page</li>
            </ul>
          </div>
        </div>
      `;

      const TARGETS = {
        about: {
          type: 'content',
          title: 'Disclaimers',
          subtitle: 'About this demo &mdash; what it is, what it isn\'t, and where the data comes from.',
          html: ABOUT_HTML,
        },
        cost: {
          type: 'iframe',
          title: 'Cost Overview',
          subtitle: 'jun02 workspace cost &amp; usage, via <code>gcc.gold.cost_daily</code> (sourced from <code>system.billing</code>). <em>Populates once Databricks provisions billing system tables on this new trial.</em>',
          src: 'https://dbc-118c818e-9d0e.cloud.databricks.com/embed/dashboardsv3/01f15eea84e7166eb938d097e30f78a6',
        },
        tracker: {
          type: 'iframe',
          title: 'Tracker GCC',
          subtitle: 'Geospatial Command Center &mdash; globe + Genie/Ask-AI over <code>gcc.gold.*</code>. <em>Requires login to the jun02 workspace.</em>',
          src: 'https://tracker-gcc-app-7474654113948055.aws.databricksapps.com',
        },
        contracts: {
          type: 'iframe',
          title: 'Contract Intelligence',
          subtitle: 'Federal Spending Analytics Platform. Queries <code>contract_intelligence.gold.*</code> (USASpending awards). <em>Requires login to the jun02 workspace.</em>',
          src: 'https://contract-intelligence-7474654113948055.aws.databricksapps.com',
        },
      };

      const iframe = document.getElementById('embed');
      const content = document.getElementById('content');
      const title = document.getElementById('title');
      const subtitle = document.getElementById('subtitle');
      const tabs = document.querySelectorAll('.tab');

      function show(key) {
        const t = TARGETS[key];
        if (!t) return;
        title.textContent = t.title;
        subtitle.innerHTML = t.subtitle;
        if (t.type === 'iframe') {
          iframe.src = t.src;
          iframe.title = t.title;
          iframe.style.display = 'block';
          content.style.display = 'none';
        } else {
          iframe.src = 'about:blank';
          iframe.style.display = 'none';
          content.innerHTML = t.html;
          content.style.display = 'block';
        }
        tabs.forEach(b => b.setAttribute('aria-selected', b.dataset.key === key));
        if (location.hash !== '#' + key) history.replaceState(null, '', '#' + key);
      }

      tabs.forEach(b => b.addEventListener('click', () => show(b.dataset.key)));

      const initial = (location.hash || '').replace('#','') in TARGETS
        ? location.hash.slice(1)
        : 'about';
      show(initial);
    </script>
  </body>
</html>
